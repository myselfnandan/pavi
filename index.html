<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <div class="text-center pb-5">
    <h1>Inventory Management System</h1>
  </div>
         <div class="mb-5">
            <h3 class="mt-5 mb-4">Add New Item</h3>
            <form id="inventory-form">
                <div class="mb-3">
                    <label for="itemName" class="form-label">Item Name</label>
                    <input type="text" id="itemName" class="form-control" required>
                </div>
  <div class="mb-3">
                    <label for="itemQuantity" class="form-label">Quantity</label>
                    <input type="number" id="itemQuantity" class="form-control" required>
                </div>
                <div class="mb-3">
<label for="itemPrice" class="form-label">Price</label>
                    <input type="number" id="itemPrice" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary">Add Item</button>
            </form>
        </div>
<h3 class="mb-4">Inventory List</h3>
        <table class="table">
            <thead>
                <tr>
                    <th>Item Name</th>
                    <th>Quantity</th>
                    <th>Price</th>
<th>Actions</th>
                </tr>
            </thead>
            <tbody id="inventory-table-body">
                <!-- Inventory items will be inserted here dynamically -->
            </tbody>
        </table>
    </div>
    <script src="index.js"></script>
</body>
</html>
